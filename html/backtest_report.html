<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回测报告</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .file-selector { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #334155; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .file-selector label { font-weight: 600; color: #e2e8f0; }
        .file-selector input[type="file"] { flex: 1; min-width: 200px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; color: #f8fafc; }
        .file-selector .hint { font-size: 12px; color: #64748b; width: 100%; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px 0; border-bottom: 1px solid #334155; }
        .header h1 { margin: 0 0 10px 0; color: #60a5fa; }
        .header p { margin: 0; color: #94a3b8; }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .metric-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .metric-value { font-size: 24px; font-weight: bold; color: #10b981; margin-bottom: 5px; }
        .metric-value.negative { color: #ef4444; }
        .metric-label { color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .chart-section { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .chart-title { font-size: 16px; font-weight: 600; margin: 0 0 15px 0; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
        .chart-title::before { content: ''; width: 4px; height: 16px; background: #2563eb; border-radius: 2px; }
        .chart-wrapper { height: 320px; position: relative; }
        .chart-legend { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .loading { text-align: center; padding: 80px 20px; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #94a3b8; font-size: 14px; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
        .data-info { background: #1e293b; border-radius: 8px; padding: 12px 16px; margin-top: 15px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; font-size: 12px; color: #64748b; }
        .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; padding: 20px; text-align: center; color: #ef4444; }
        .error-box small { color: #94a3b8; display: block; margin-top: 10px; }
        .current-file { font-size: 12px; color: #64748b; margin-left: auto; }
        .current-file strong { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="file-selector">
        <label for="jsonFile">选择回测结果 JSON 文件:</label>
        <input type="file" id="jsonFile" accept=".json">
        <span class="current-file" id="currentFile">未选择文件</span>
        <div class="hint">支持拖拽文件到此处，或点击选择 result 目录下的 backtest_result.json 文件</div>
    </div>
    
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">请选择回测结果 JSON 文件...</div>
    </div>
    
    <div id="content" style="display: none;">
        <div class="header">
            <h1 id="reportTitle">回测报告</h1>
            <p id="dateRange">-</p>
        </div>
        
        <div class="metrics" id="metricsGrid"></div>
        
        <!-- 价格与累计收益率对照图 -->
        <div class="chart-section">
            <h3 class="chart-title">价格走势与累计收益率对照</h3>
            <div class="chart-wrapper">
                <canvas id="priceAndReturnChart"></canvas>
            </div>
            <div class="chart-legend">
                <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>ETH 价格 (USD)</div>
                <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>累计收益率 (%)</div>
            </div>
        </div>
        
        <!-- 日收益率和日收益金额合并图 -->
        <div class="chart-grid">
            <div class="chart-section">
                <h3 class="chart-title">日收益率与收益金额</h3>
                <div class="chart-wrapper">
                    <canvas id="dailyReturnAmountChart"></canvas>
                </div>
                <div class="chart-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>日收益率 (%)</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>日收益金额 (USDT)</div>
                </div>
            </div>
            
            <div class="chart-section">
                <h3 class="chart-title">日收益率分布</h3>
                <div class="chart-wrapper">
                    <canvas id="returnDistChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="data-info">
            <span>数据源: <span id="dataSource">Gate.io 历史数据</span></span>
            <span>更新时间: <span id="updateTime">-</span></span>
            <span>数据点数: <span id="dataPoints">-</span></span>
        </div>
    </div>

    <script>
        // 全局变量
        let backtestData = null;
        let priceChart = null;
        let dailyChart = null;
        let distChart = null;
        
        // =============================================
        // 文件选择器初始化
        // =============================================
        function initFileSelector() {
            const fileInput = document.getElementById('jsonFile');
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    loadJsonFromFile(file);
                }
            });
            
            // 拖拽支持
            const dropZone = document.querySelector('.file-selector');
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = '#60a5fa';
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.style.borderColor = '#334155';
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = '#334155';
                const file = e.dataTransfer.files[0];
                if (file && file.name.endsWith('.json')) {
                    loadJsonFromFile(file);
                }
            });
        }
        
        // =============================================
        // 从文件加载JSON
        // =============================================
        function loadJsonFromFile(file) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            document.getElementById('currentFile').innerHTML = `当前: <strong>${file.name}</strong>`;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    backtestData = JSON.parse(e.target.result);
                    init();
                } catch (err) {
                    document.getElementById('loading').innerHTML = `
                        <div class="error-box">
                            JSON 解析失败: ${err.message}<br>
                            <small>请确认文件是正确的回测结果格式</small>
                        </div>
                    `;
                }
            };
            reader.onerror = () => {
                document.getElementById('loading').innerHTML = `
                    <div class="error-box">
                        文件读取失败<br>
                        <small>请重试或选择其他文件</small>
                    </div>
                `;
            };
            reader.readAsText(file);
        }
        
        // =============================================
        // 初始化
        // =============================================
        function init() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            const equity = backtestData.data_series.equity;
            const params = backtestData.backtest_params;
            const metrics = backtestData.key_metrics;
            
            // 更新头部信息
            const direction = params.direction || '做空';
            document.getElementById('reportTitle').textContent = 
                `${params.market} ${params.leverage}x ${direction} 回测报告`;
            document.getElementById('dateRange').textContent = 
                `${params.backtest_from} 至 ${params.backtest_to} | ${params.interval}`;
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
            document.getElementById('dataPoints').textContent = equity.length;
            document.getElementById('dataSource').textContent = 
                params.data_source === 'gate_history' ? 'Gate.io 历史数据' : params.data_source;
            
            // 销毁旧图表
            destroyCharts();
            
            // 渲染指标卡片
            renderMetrics(metrics);
            
            // 创建图表
            createPriceAndReturnChart(equity);
            createDailyReturnAmountChart(equity);
            createReturnDistChart(equity);
        }
        
        function destroyCharts() {
            if (priceChart) { priceChart.destroy(); priceChart = null; }
            if (dailyChart) { dailyChart.destroy(); dailyChart = null; }
            if (distChart) { distChart.destroy(); distChart = null; }
        }
        
        // =============================================
        // 渲染指标卡片
        // =============================================
        function renderMetrics(metrics) {
            const container = document.getElementById('metricsGrid');
            const items = [
                { label: '总收益率', value: formatPct(metrics.total_return_pct), 
                  isNegative: metrics.total_return_pct < 0 },
                { label: '年化收益率', value: formatPct(metrics.annual_return_pct),
                  isNegative: metrics.annual_return_pct < 0 },
                { label: '最大回撤', value: formatPct(metrics.max_drawdown_pct),
                  isNegative: true },
                { label: '夏普比率', value: metrics.sharpe_ratio.toFixed(2),
                  isNegative: metrics.sharpe_ratio < 0 },
                { label: '波动率', value: formatPct(metrics.volatility_pct) },
                { label: '胜率', value: formatPct(metrics.win_rate_pct) },
                { label: '初始价格', value: '$' + (metrics.initial_price || 0).toFixed(2) },
                { label: '最终价格', value: '$' + (metrics.final_price || 0).toFixed(2) }
            ];
            
            container.innerHTML = items.map(item => `
                <div class="metric-card">
                    <div class="metric-value ${item.isNegative ? 'negative' : ''}">${item.value}</div>
                    <div class="metric-label">${item.label}</div>
                </div>
            `).join('');
        }
        
        function formatPct(val) {
            const sign = val >= 0 ? '+' : '';
            return sign + val.toFixed(2) + '%';
        }
        
        // =============================================
        // 图表1: 价格与累计收益率对照
        // =============================================
        function createPriceAndReturnChart(equity) {
            const ctx = document.getElementById('priceAndReturnChart').getContext('2d');
            
            const cumulativeReturns = [];
            let runningReturn = 0;
            
            equity.forEach((item, i) => {
                if (i === 0) {
                    cumulativeReturns.push(0);
                } else {
                    const dailyReturn = ((item.price - equity[i-1].price) / equity[i-1].price) * 100;
                    runningReturn += dailyReturn;
                    cumulativeReturns.push(runningReturn);
                }
            });
            
            const labels = equity.map((d, i) => i);
            const priceData = equity.map(d => d.price);
            
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'ETH价格',
                            data: priceData,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0,
                            yAxisID: 'y'
                        },
                        {
                            label: '累计收益率',
                            data: cumulativeReturns,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(30, 41, 59, 0.95)',
                            titleColor: '#f8fafc',
                            bodyColor: '#cbd5e1',
                            borderColor: '#334155',
                            borderWidth: 1,
                            callbacks: {
                                title: ctx => equity[ctx[0].dataIndex] ? equity[ctx[0].dataIndex].time.substring(0, 10) : '',
                                label: ctx => {
                                    if (ctx.datasetIndex === 0) {
                                        return `ETH价格: $${ctx.raw.toFixed(2)}`;
                                    } else {
                                        return `累计收益: ${ctx.raw.toFixed(2)}%`;
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { 
                                color: '#64748b',
                                maxTicksLimit: 12,
                                callback: v => equity[v] ? equity[v].time.substring(0, 7) : ''
                            },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            type: 'linear',
                            position: 'left',
                            title: { display: true, text: 'ETH价格 (USD)', color: '#2563eb' },
                            ticks: { color: '#64748b', callback: v => '$' + v.toFixed(0) },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            title: { display: true, text: '累计收益率 (%)', color: '#10b981' },
                            ticks: { color: '#64748b', callback: v => v.toFixed(0) + '%' },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }
        
        // =============================================
        // 图表2: 日收益率和日收益金额合并
        // =============================================
        function createDailyReturnAmountChart(equity) {
            const ctx = document.getElementById('dailyReturnAmountChart').getContext('2d');
            
            const investment = backtestData.backtest_params.investment;
            const leverage = backtestData.backtest_params.leverage;
            
            const dailyReturns = [];
            const dailyAmounts = [];
            const labels = [];
            
            for (let i = 1; i < equity.length; i++) {
                const prevPrice = equity[i-1].price;
                const currentPrice = equity[i].price;
                
                const dailyReturn = ((currentPrice - prevPrice) / prevPrice) * leverage;
                dailyReturns.push(dailyReturn);
                dailyAmounts.push(investment * (dailyReturn / 100));
                labels.push(i);
            }
            
            dailyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '日收益率',
                            data: dailyReturns,
                            backgroundColor: dailyReturns.map(r => 
                                r >= 0 ? 'rgba(139, 92, 246, 0.6)' : 'rgba(139, 92, 246, 0.3)'
                            ),
                            borderColor: dailyReturns.map(r =>
                                r >= 0 ? '#8b5cf6' : '#6d28d9'
                            ),
                            borderWidth: 1,
                            yAxisID: 'y'
                        },
                        {
                            type: 'line',
                            label: '收益金额',
                            data: dailyAmounts,
                            borderColor: '#f59e0b',
                            backgroundColor: 'transparent',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.2,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(30, 41, 59, 0.95)',
                            callbacks: {
                                title: ctx => equity[ctx[0].dataIndex + 1] ? equity[ctx[0].dataIndex + 1].time.substring(0, 10) : '',
                                label: ctx => {
                                    if (ctx.datasetIndex === 0) {
                                        return `日收益率: ${ctx.raw.toFixed(2)}%`;
                                    } else {
                                        return `收益金额: $${ctx.raw.toFixed(2)}`;
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { 
                                color: '#64748b',
                                maxTicksLimit: 10,
                                callback: v => {
                                    const idx = Math.floor(v);
                                    if (idx > 0 && idx < equity.length) {
                                        return equity[idx + 1] ? equity[idx + 1].time.substring(0, 7) : '';
                                    }
                                    return '';
                                }
                            },
                            grid: { display: false }
                        },
                        y: {
                            type: 'linear',
                            position: 'left',
                            title: { display: true, text: '收益率 (%)', color: '#8b5cf6' },
                            ticks: { color: '#64748b', callback: v => v.toFixed(0) + '%' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            title: { display: true, text: '金额 (USDT)', color: '#f59e0b' },
                            ticks: { color: '#64748b', callback: v => '$' + v.toFixed(0) },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }
        
        // =============================================
        // 图表3: 收益率分布直方图
        // =============================================
        function createReturnDistChart(equity) {
            const ctx = document.getElementById('returnDistChart').getContext('2d');
            
            const leverage = backtestData.backtest_params.leverage;
            
            const returns = [];
            for (let i = 1; i < equity.length; i++) {
                const dailyReturn = ((equity[i].price - equity[i-1].price) / equity[i-1].price) * leverage;
                returns.push(dailyReturn);
            }
            
            const binCount = 25;
            const minReturn = Math.min(...returns);
            const maxReturn = Math.max(...returns);
            const binSize = (maxReturn - minReturn) / binCount;
            
            const bins = new Array(binCount).fill(0);
            const binLabels = [];
            
            for (let i = 0; i < binCount; i++) {
                const start = minReturn + i * binSize;
                binLabels.push(`${start.toFixed(1)}%`);
            }
            
            returns.forEach(r => {
                const idx = Math.min(Math.floor((r - minReturn) / binSize), binCount - 1);
                bins[idx]++;
            });
            
            const colors = binLabels.map(label => {
                const val = parseFloat(label);
                if (val < -5) return 'rgba(239, 68, 68, 0.8)';
                if (val < 0) return 'rgba(249, 115, 22, 0.7)';
                if (val < 5) return 'rgba(34, 197, 94, 0.7)';
                return 'rgba(16, 185, 129, 0.8)';
            });
            
            distChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: binLabels,
                    datasets: [{
                        label: '天数',
                        data: bins,
                        backgroundColor: colors,
                        borderColor: colors.map(c => c.replace(/0\.\d+/, '1')),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(30, 41, 59, 0.95)',
                            callbacks: {
                                title: ctx => `收益率: ${ctx[0].label}%`,
                                label: ctx => `天数: ${ctx.raw}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { 
                                color: '#64748b',
                                maxRotation: 45,
                                callback: (v, idx) => {
                                    if (idx % 5 === 0) return binLabels[idx];
                                    return '';
                                }
                            },
                            grid: { display: false }
                        },
                        y: {
                            ticks: { color: '#64748b' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }
        
        // =============================================
        // 启动
        // =============================================
        window.addEventListener('DOMContentLoaded', initFileSelector);
    </script>
</body>
</html>
