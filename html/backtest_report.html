<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回测报告</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .file-selector { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #334155; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .file-selector label { font-weight: 600; color: #e2e8f0; }
        .file-selector input[type="file"] { flex: 1; min-width: 200px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; color: #f8fafc; }
        .file-selector .hint { font-size: 12px; color: #64748b; width: 100%; }
        .info-bar { background: #1e293b; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; display: flex; gap: 24px; font-size: 13px; }
        .info-item { display: flex; gap: 8px; }
        .info-label { color: #64748b; }
        .info-value { color: #10b981; font-weight: 600; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px 0; border-bottom: 1px solid #334155; }
        .header h1 { margin: 0 0 10px 0; color: #60a5fa; }
        .header p { margin: 0; color: #94a3b8; }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .metric-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .metric-value { font-size: 24px; font-weight: bold; color: #10b981; margin-bottom: 5px; }
        .metric-value.negative { color: #ef4444; }
        .metric-label { color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .chart-section { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .chart-title { font-size: 16px; font-weight: 600; margin: 0 0 15px 0; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
        .chart-title::before { content: ''; width: 4px; height: 16px; background: #2563eb; border-radius: 2px; }
        .chart-wrapper { height: 320px; position: relative; }
        .chart-legend { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .loading { text-align: center; padding: 80px 20px; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #94a3b8; font-size: 14px; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
        .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; padding: 20px; text-align: center; color: #ef4444; }
    </style>
</head>
<body>
    <div class="file-selector">
        <label for="jsonFile">选择回测结果 JSON 文件:</label>
        <input type="file" id="jsonFile" accept=".json">
        <div class="hint">拖拽文件到此处，或点击选择</div>
    </div>
    
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">请选择回测结果 JSON 文件...</div>
    </div>
    
    <div id="content" style="display: none;">
        <!-- 信息栏 -->
        <div class="info-bar" id="infoBar">
            <div class="info-item"><span class="info-label">原始数据:</span><span class="info-value" id="infoRaw">-</span></div>
            <div class="info-item"><span class="info-label">数据粒度:</span><span class="info-value" id="infoInterval">-</span></div>
            <div class="info-item"><span class="info-label">聚合天数:</span><span class="info-value" id="infoDays">-</span></div>
        </div>
        
        <div class="header">
            <h1 id="reportTitle">回测报告</h1>
            <p id="dateRange">-</p>
        </div>
        
        <div class="metrics" id="metricsGrid"></div>
        
        <!-- 价格与累计收益率 -->
        <div class="chart-section">
            <h3 class="chart-title">价格走势与累计收益率</h3>
            <div class="chart-wrapper"><canvas id="chartPrice"></canvas></div>
            <div class="chart-legend">
                <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>每日收盘价 (USD)</div>
                <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>累计收益 (USDT)</div>
            </div>
        </div>
        
        <!-- 日收益率 -->
        <div class="chart-grid">
            <div class="chart-section">
                <h3 class="chart-title">日收益率与日收益金额</h3>
                <div class="chart-wrapper"><canvas id="chartDaily"></canvas></div>
                <div class="chart-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>日收益率 (%)</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>日收益 (USDT)</div>
                </div>
            </div>
            
            <div class="chart-section">
                <h3 class="chart-title">收益率分布</h3>
                <div class="chart-wrapper"><canvas id="chartDist"></canvas></div>
            </div>
        </div>

        <!-- 买卖密度图 -->
        <div class="chart-section">
            <h3 class="chart-title">每日买卖密度</h3>
            <div class="chart-wrapper"><canvas id="chartVolume"></canvas></div>
            <div class="chart-legend">
                <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>卖出量 (代币数)</div>
                <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>买入量 (代币数)</div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        
        // ========== 全局变量 ==========
        let chartPrice = null;
        let chartDaily = null;
        let chartDist = null;
        let chartVolume = null;
        
        // ========== 工具函数 ==========
        function parseTime(str) {
            return new Date(str.replace('+00:00', 'Z').replace('+08:00', '+08:00'));
        }
        
        function formatDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        }
        
        function formatPct(val) {
            return (val >= 0 ? '+' : '') + val.toFixed(2) + '%';
        }
        
        // ========== 数据处理 ==========
        function aggregateToDaily(equity) {
            const daily = {};
            for (let i = 0; i < equity.length; i++) {
                const t = parseTime(equity[i].time);
                const date = formatDate(t);
                daily[date] = {
                    time: date,
                    price: equity[i].price,
                    position: equity[i].position || 0,
                    fund: equity[i].fund || equity[i].price,
                    index: i  // 保留原始索引
                };
            }
            const result = Object.values(daily).sort((a, b) => a.time.localeCompare(b.time));
            return result;
        }
        
        // 检测并修复 fund 跳变（处理并行回测导致的数据不连续问题）
        function fixFundJumps(daily) {
            if (daily.length < 2) return daily;

            const fixed = daily.map(d => ({...d}));
            const jumpThreshold = 0.3; // 30% 的跳变阈值

            // 检测跳变点并修复（每次跳变只应用一次调整）
            for (let i = 1; i < fixed.length; i++) {
                const currMonth = fixed[i].time.substring(0, 7);
                const prevMonth = fixed[i-1].time.substring(0, 7);

                // 只在月份变化时检测跳变
                if (currMonth !== prevMonth) {
                    const prevFund = fixed[i-1].fund;
                    const currFund = fixed[i].fund;
                    const changeRatio = currFund / prevFund;

                    // 如果变化超过阈值，认为是资金重置
                    if (Math.abs(1 - changeRatio) > jumpThreshold) {
                        const adjustment = prevFund - currFund;
                        console.log(`[FIX] ${fixed[i].time}: fund ${currFund.toFixed(2)} -> ${prevFund.toFixed(2)} (调整: ${adjustment.toFixed(2)}, 月份: ${prevMonth} -> ${currMonth})`);

                        // 将调整量应用到该月及之后的所有数据
                        for (let j = i; j < fixed.length; j++) {
                            fixed[j].fund += adjustment;
                        }
                    }
                }
            }

            return fixed;
        }
        
        function computeStats(daily, leverage, investment) {
            // 先修复 fund 跳变
            const fixedDaily = fixFundJumps(daily);
            
            // 使用 fund 字段计算收益
            const initialFund = fixedDaily[0].fund;
            const stats = { returns: [], cumReturns: [], cumAmounts: [], dailyAmounts: [], dates: [] };
            
            for (let i = 1; i < fixedDaily.length; i++) {
                const prevFund = fixedDaily[i-1].fund;
                const currFund = fixedDaily[i].fund;
                
                // 日收益率
                const ret = ((currFund - prevFund) / prevFund) * 100;
                // 累计收益率
                const cumRet = ((currFund - initialFund) / initialFund) * 100;
                // 日收益金额
                const dailyAmount = currFund - prevFund;
                // 累计收益金额
                const cumAmount = currFund - initialFund;
                
                stats.returns.push(ret);
                stats.cumReturns.push(cumRet);
                stats.cumAmounts.push(cumAmount);
                stats.dailyAmounts.push(dailyAmount);
                stats.dates.push(fixedDaily[i].time);
            }
            return stats;
        }
        
        // ========== 图表渲染 ==========
        function renderMetrics(metrics) {
            const items = [
                { label: '总收益率', value: formatPct(metrics.total_return_pct), neg: metrics.total_return_pct < 0 },
                { label: '年化收益率', value: formatPct(metrics.annual_return_pct), neg: metrics.annual_return_pct < 0 },
                { label: '最大回撤', value: formatPct(metrics.max_drawdown_pct), neg: true },
                { label: '夏普比率', value: metrics.sharpe_ratio.toFixed(2), neg: metrics.sharpe_ratio < 0 },
                { label: '波动率', value: formatPct(metrics.volatility_pct) },
                { label: '胜率', value: formatPct(metrics.win_rate_pct) },
                { label: '初始价格', value: '$' + (metrics.initial_price || 0).toFixed(2) },
                { label: '最终价格', value: '$' + (metrics.final_price || 0).toFixed(2) }
            ];
            
            document.getElementById('metricsGrid').innerHTML = items.map(item => 
                '<div class="metric-card"><div class="metric-value' + (item.neg ? ' negative' : '') + '">' + 
                item.value + '</div><div class="metric-label">' + item.label + '</div></div>'
            ).join('');
        }
        
        function renderChartPrice(ctx, daily, stats) {
            const labels = daily.slice(1).map(d => d.time.substring(0, 7));
            const prices = daily.slice(1).map(d => d.price);
            const cumAmounts = stats.cumAmounts;  // 累计收益金额
            
            if (chartPrice) chartPrice.destroy();
            chartPrice = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '价格', data: prices, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.1)',
                          borderWidth: 1.5, fill: true, tension: 0.1, pointRadius: 0, yAxisID: 'y' },
                        { label: '累计收益', data: cumAmounts, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)',
                          borderWidth: 1.5, fill: true, tension: 0.1, pointRadius: 0, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#64748b', maxTicksLimit: 8 }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { type: 'linear', position: 'left', title: { text: '价格 (USD)', color: '#2563eb' },
                             ticks: { color: '#64748b', callback: v => '$' + v.toFixed(0) },
                             grid: { color: 'rgba(255,255,255,0.05)' } },
                        y1: { type: 'linear', position: 'right', title: { text: '累计收益 (USDT)', color: '#10b981' },
                              ticks: { color: '#64748b', callback: v => '$' + v.toFixed(2) },
                              grid: { drawOnChartArea: false } }
                    }
                }
            });
        }
        
        function renderChartDaily(ctx, stats) {
            const returns = stats.returns;
            const dailyAmounts = stats.dailyAmounts;
            const labels = stats.dates.map(d => d.substring(0, 7));
            
            const bgColors = returns.map(r => r >= 0 ? 'rgba(139,92,246,0.6)' : 'rgba(139,92,246,0.3)');
            const borderColors = returns.map(r => r >= 0 ? '#8b5cf6' : '#6d28d9');
            
            if (chartDaily) chartDaily.destroy();
            chartDaily = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '收益率', data: returns, backgroundColor: bgColors, borderColor: borderColors, borderWidth: 1, yAxisID: 'y' },
                        { type: 'line', label: '日收益', data: dailyAmounts, borderColor: '#f59e0b', borderWidth: 1.5, pointRadius: 0, tension: 0.2, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#64748b', maxTicksLimit: 8 }, grid: { display: false } },
                        y: { type: 'linear', position: 'left', title: { text: '收益率 (%)', color: '#8b5cf6' },
                             ticks: { color: '#64748b', callback: v => v.toFixed(0) + '%' },
                             grid: { color: 'rgba(255,255,255,0.05)' } },
                        y1: { type: 'linear', position: 'right', title: { text: '日收益 (USDT)', color: '#f59e0b' },
                              ticks: { color: '#64748b', callback: v => '$' + v.toFixed(2) },
                              grid: { drawOnChartArea: false } }
                    }
                }
            });
        }
        
        function renderChartDist(ctx, stats) {
            const returns = stats.returns;
            if (returns.length === 0) return;
            
            const binCount = 25;
            let min = Math.min(...returns), max = Math.max(...returns);
            if (min === max) { min -= 1; max += 1; }
            
            const binSize = (max - min) / binCount;
            const bins = new Array(binCount).fill(0);
            const labels = [];
            
            for (let i = 0; i < binCount; i++) {
                labels.push((min + i * binSize).toFixed(1) + '%');
            }
            
            for (const r of returns) {
                let idx = Math.floor((r - min) / binSize);
                idx = Math.max(0, Math.min(binCount - 1, idx));
                bins[idx]++;
            }
            
            const colors = labels.map((_, i) => {
                const val = min + i * binSize;
                if (val < -5) return 'rgba(239,68,68,0.8)';
                if (val < 0) return 'rgba(249,115,22,0.7)';
                if (val < 5) return 'rgba(34,197,94,0.7)';
                return 'rgba(16,185,129,0.8)';
            });
            
            if (chartDist) chartDist.destroy();
            chartDist = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: '天数', data: Array.from(bins), backgroundColor: colors, borderWidth: 1 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#64748b', maxRotation: 45, callback: (v, i) => i % 5 === 0 ? labels[i] : '' }, grid: { display: false } },
                        y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        }

        function renderChartVolume(ctx, data) {
            if (!data || data.length === 0) {
                // 如果没有交易数据，显示提示
                console.log('[CHART] 无交易量数据');
                return;
            }

            // 过滤有交易的天数（买卖量都为0的跳过）
            const hasVolume = data.filter(d => d.buy_volume > 0 || d.sell_volume > 0);
            
            if (hasVolume.length === 0) {
                console.log('[CHART] 所有日期买卖量都为0');
                return;
            }
            
            // 为了可读性，对数量进行缩放
            const maxVol = Math.max(...hasVolume.map(d => Math.max(d.buy_volume, d.sell_volume)));
            const scale = maxVol > 1000 ? 1000 : maxVol > 100 ? 100 : 1;
            const unit = scale === 1000 ? 'K' : scale === 100 ? '百' : '';
            
            const labels = data.map(d => d.date);
            const buyData = data.map(d => d.buy_volume / scale);
            const sellData = data.map(d => d.sell_volume / scale);
            
            if (chartVolume) chartVolume.destroy();
            chartVolume = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '卖出量',
                            data: sellData,
                            backgroundColor: 'rgba(239, 68, 68, 0.8)',
                            borderColor: '#ef4444',
                            borderWidth: 1
                        },
                        {
                            label: '买入量',
                            data: buyData,
                            backgroundColor: 'rgba(34, 197, 94, 0.8)',
                            borderColor: '#22c55e',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const vol = context.raw * scale;
                                    return context.dataset.label + ': ' + vol.toFixed(4) + (unit ? ' ' + unit : '');
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#64748b', maxTicksLimit: 15 },
                            grid: { display: false },
                            stacked: false
                        },
                        y: {
                            ticks: { color: '#64748b' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            title: {
                                display: true,
                                text: unit ? '代币数量 (' + unit + ')' : '代币数量',
                                color: '#94a3b8'
                            }
                        }
                    }
                }
            });
        }
        
        // ========== 初始化 ==========
        function init() {
            const data = window.backtestData;
            const equity = data.data_series.equity;
            const params = data.backtest_params;
            const metrics = data.key_metrics;
            
            // 更新信息栏
            document.getElementById('infoRaw').textContent = equity.length.toLocaleString() + ' 条';
            document.getElementById('infoInterval').textContent = params.interval;
            
            // 聚合日度数据
            const daily = aggregateToDaily(equity);
            document.getElementById('infoDays').textContent = daily.length + ' 天';
            
            // 计算统计数据
            const stats = computeStats(daily, params.leverage, params.investment);
            
            // 更新标题
            document.getElementById('reportTitle').textContent = 
                params.market + ' ' + params.leverage + 'x ' + (params.direction || '做空') + ' 回测报告';
            document.getElementById('dateRange').textContent = 
                params.backtest_from + ' 至 ' + params.backtest_to;
            
            // 渲染
            renderMetrics(metrics);
            renderChartPrice(document.getElementById('chartPrice').getContext('2d'), daily, stats);
            renderChartDaily(document.getElementById('chartDaily').getContext('2d'), stats);
            renderChartDist(document.getElementById('chartDist').getContext('2d'), stats);
            renderChartVolume(document.getElementById('chartVolume').getContext('2d'), data.data_series.trade_volume);
        }
        
        // ========== 文件加载 ==========
        function loadFile(file) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    window.backtestData = JSON.parse(e.target.result);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    init();
                } catch(err) {
                    document.getElementById('loading').innerHTML = 
                        '<div class="error-box">JSON解析失败: ' + err.message + '</div>';
                }
            };
            reader.onerror = function() {
                document.getElementById('loading').innerHTML = 
                    '<div class="error-box">文件读取失败</div>';
            };
            reader.readAsText(file);
        }
        
        // ========== 事件绑定 ==========
        document.getElementById('jsonFile').addEventListener('change', function(e) {
            if (e.target.files[0]) loadFile(e.target.files[0]);
        });
        
        const dropZone = document.querySelector('.file-selector');
        dropZone.addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderColor = '#60a5fa'; });
        dropZone.addEventListener('dragleave', function() { this.style.borderColor = '#334155'; });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = '#334155';
            if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
        });
        
    })();
    </script>
</body>
</html>
